<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Kreatif V5 - Minimal Accent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 60px -15px rgb(15 23 42 / 0.2);
            margin: 30px auto;
            padding: 0;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11.1pt;
            line-height: 1.78;
            color: #1f2937;
        }

        .accent-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 14mm;
            background: linear-gradient(to bottom, #10b981, #059669);
        }

        .main-area {
            padding: 45px 48px 45px 68px;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 36pt;
            font-weight: 700;
            letter-spacing: -2px;
            color: #111827;
        }

        .section-title {
            font-size: 14.5pt;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 12px;
            position: relative;
        }
        
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 3px;
            background: #10b981;
        }

        .profile-photo {
            width: 128px;
            height: 128px;
            object-fit: cover;
            border: 6px solid #f3f4f6;
            border-radius: 9999px;
            box-shadow: 0 10px 25px -5px rgb(16 185 129 / 0.2);
        }

        @media print {
            .no-print { display: none !important; }
            .a4-paper { margin: 0; box-shadow: none; }
        }
        @page { size: A4 portrait; margin: 0; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-slate-100 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-zinc-900 text-white sticky top-0 z-50 no-print shadow-xl">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-leaf text-3xl text-emerald-400"></i>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">CV KREATIF <span class="text-emerald-400">V5</span></h1>
                    <p class="text-xs text-slate-400 -mt-0.5">Minimalist Accent • Premium Clean</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <button onclick="autoSaveDraft()" class="flex items-center gap-x-2 px-5 h-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">
                    <i class="fa-solid fa-floppy-disk"></i> Simpan Draft
                </button>
                <button onclick="saveAsImage()" class="flex items-center gap-x-2 px-5 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-image"></i> PNG
                </button>
                <button onclick="generatePDF()" class="flex items-center gap-x-2 px-6 h-10 bg-teal-600 hover:bg-teal-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-file-pdf"></i> PDF
                </button>
                <button onclick="printLetter()" class="flex items-center gap-x-2 px-6 h-10 bg-white text-zinc-900 hover:bg-slate-100 rounded-2xl font-medium">
                    <i class="fa-solid fa-print"></i> Cetak
                </button>
                <button onclick="clearForm()" class="flex items-center justify-center w-10 h-10 text-red-400 hover:text-red-500 rounded-2xl">
                    <i class="fa-solid fa-trash text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORM INPUT -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-2xl p-8 no-print overflow-auto max-h-screen">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-emerald-700">CV Kreatif V5</h2>
                    <p class="text-emerald-600 text-sm mt-1">Minimalist dengan Accent Bar</p>
                </div>
                
                <div class="space-y-9">
                    <!-- Foto -->
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-2">Foto Profil</label>
                        <input type="file" id="foto-upload" accept="image/*" class="hidden" onchange="previewFoto(this)">
                        <button onclick="document.getElementById('foto-upload').click()" 
                                class="w-full h-40 border-2 border-dashed border-emerald-300 hover:border-emerald-500 rounded-3xl flex flex-col items-center justify-center text-slate-500">
                            <i class="fa-solid fa-user-circle text-6xl mb-3"></i>
                            <span class="text-sm font-medium">Upload Foto</span>
                        </button>
                        <img id="foto-preview" class="hidden mx-auto mt-4 rounded-3xl shadow" style="width:120px; height:120px; object-fit:cover;">
                    </div>

                    <!-- Data Diri -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Data Diri</h3>
                        <input id="nama" type="text" value="Muhammad Hafis" placeholder="Nama Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mb-4" oninput="updatePreview()">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input id="telepon" type="tel" value="0856-1234-5678" placeholder="Telepon" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                            <input id="email" type="email" value="hafis@example.com" placeholder="Email" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>
                        <input id="alamat" type="text" value="Paninggaran, Pekalongan, Jawa Tengah" placeholder="Domisili" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-4" oninput="updatePreview()">
                        <input id="linkedin" type="text" value="linkedin.com/in/hafis" placeholder="LinkedIn / Portfolio" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-3" oninput="updatePreview()">
                    </div>

                    <!-- Ringkasan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Ringkasan Profesional</h3>
                        <textarea id="ringkasan" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">Fresh Graduate Teknik Jaringan Komputer & Telekomunikasi yang teliti dan inovatif. Memiliki passion kuat di IT Support, network troubleshooting, dan pengembangan web. Siap berkontribusi dengan ide segar dan dedikasi tinggi.</textarea>
                    </div>

                    <!-- Pengalaman Kerja -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pengalaman Kerja</h3>
                        <div id="pengalaman-container" class="space-y-4"></div>
                        <button onclick="tambahPengalaman()" class="mt-3 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pengalaman
                        </button>
                    </div>

                    <!-- Magang -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pengalaman Magang</h3>
                        <div id="magang-container" class="space-y-4"></div>
                        <button onclick="tambahMagang()" class="mt-3 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Magang
                        </button>
                    </div>

                    <!-- Pendidikan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pendidikan</h3>
                        <div id="pendidikan-container" class="space-y-4"></div>
                        <button onclick="tambahPendidikan()" class="mt-3 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pendidikan
                        </button>
                    </div>

                    <!-- Keterampilan & Proyek -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Keterampilan</h3>
                        <textarea id="keterampilan" rows="7" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">• Network Administration & Troubleshooting
• HTML, CSS, Tailwind CSS, JavaScript
• Frontend Web Development
• Microsoft Office & Google Workspace
• Figma UI/UX Basics
• Adobe Photoshop & Illustrator
• Bahasa Inggris (Intermediate)</textarea>
                    </div>

                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Proyek & Sertifikasi</h3>
                        <textarea id="sertifikasi" rows="5" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">• Sistem Monitoring Jaringan Sekolah Berbasis Web
• Cisco Networking Academy Certificate
• Proyek Website Sekolah dengan Tailwind CSS
• Mini Project IoT Smart Monitoring</textarea>
                    </div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="lg:col-span-7">
                <div class="preview-header flex justify-between items-center mb-4 px-2 no-print">
                    <h3 class="font-semibold text-emerald-700 flex items-center gap-x-2">
                        <i class="fa-solid fa-eye"></i> Pratinjau CV Kreatif V5
                    </h3>
                    <span class="text-xs bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-3xl">MINIMAL ACCENT</span>
                </div>
                
                <div class="preview-wrapper bg-white p-6 rounded-3xl shadow-inner overflow-x-auto">
                    <div id="cv" class="a4-paper mx-auto relative">
                        <div class="accent-bar"></div>
                        <div class="main-area" id="cv-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cvData = { foto: null };

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    cvData.foto = e.target.result;
                    document.getElementById('foto-preview').src = cvData.foto;
                    document.getElementById('foto-preview').classList.remove('hidden');
                    updatePreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function tambahPengalaman() {
            const container = document.getElementById('pengalaman-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="exp-posisi-${index}" placeholder="Posisi / Jabatan" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="exp-perusahaan-${index}" placeholder="Nama Perusahaan" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="exp-periode-${index}" placeholder="Periode" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <textarea id="exp-deskripsi-${index}" rows="3" placeholder="Deskripsi tugas & pencapaian" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()"></textarea>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function tambahMagang() {
            const container = document.getElementById('magang-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="mag-posisi-${index}" placeholder="Posisi Magang" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="mag-perusahaan-${index}" placeholder="Perusahaan / Instansi" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="mag-periode-${index}" placeholder="Periode" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <textarea id="mag-deskripsi-${index}" rows="3" placeholder="Deskripsi tugas & pencapaian" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()"></textarea>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function tambahPendidikan() {
            const container = document.getElementById('pendidikan-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="pend-nama-${index}" placeholder="Sekolah / Universitas & Jurusan" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="pend-tahun-${index}" placeholder="Tahun" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
            `;
            container.appendChild(div);
            updatePreview();
        }

        function updatePreview() {
            const nama = document.getElementById('nama').value || "Nama Lengkap";
            const telepon = document.getElementById('telepon').value || "";
            const email = document.getElementById('email').value || "";
            const alamat = document.getElementById('alamat').value || "";
            const linkedin = document.getElementById('linkedin').value || "";
            const ringkasan = document.getElementById('ringkasan').value || "";
            const keterampilan = document.getElementById('keterampilan').value || "";
            const sertifikasi = document.getElementById('sertifikasi').value || "";

            const fotoHTML = cvData.foto 
                ? `<img src="${cvData.foto}" class="profile-photo mx-auto block" alt="Foto Profil">` 
                : `<div class="w-[128px] h-[128px] mx-auto bg-slate-100 rounded-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-user text-7xl"></i></div>`;

            let expHTML = '';
            document.querySelectorAll('#pengalaman-container > div').forEach((child, i) => {
                const posisi = child.querySelector(`#exp-posisi-${i}`)?.value.trim() || '';
                const perusahaan = child.querySelector(`#exp-perusahaan-${i}`)?.value.trim() || '';
                const periode = child.querySelector(`#exp-periode-${i}`)?.value.trim() || '';
                const deskripsi = child.querySelector(`#exp-deskripsi-${i}`)?.value.trim() || '';
                if (posisi || perusahaan) {
                    expHTML += `<div class="mb-9"><p class="font-semibold text-lg">${posisi} — ${perusahaan}</p><p class="text-emerald-600 text-sm">${periode}</p><div class="mt-3 text-slate-700 whitespace-pre-line">${deskripsi.replace(/\n/g, '<br>')}</div></div>`;
                }
            });

            let magangHTML = '';
            document.querySelectorAll('#magang-container > div').forEach((child, i) => {
                const posisi = child.querySelector(`#mag-posisi-${i}`)?.value.trim() || '';
                const perusahaan = child.querySelector(`#mag-perusahaan-${i}`)?.value.trim() || '';
                const periode = child.querySelector(`#mag-periode-${i}`)?.value.trim() || '';
                const deskripsi = child.querySelector(`#mag-deskripsi-${i}`)?.value.trim() || '';
                if (posisi || perusahaan) {
                    magangHTML += `<div class="mb-9"><p class="font-semibold">${posisi} — ${perusahaan}</p><p class="text-emerald-600 text-sm">${periode}</p><div class="mt-3 text-slate-700 whitespace-pre-line">${deskripsi.replace(/\n/g, '<br>')}</div></div>`;
                }
            });

            let pendHTML = '';
            document.querySelectorAll('#pendidikan-container > div').forEach((child, i) => {
                const nama = child.querySelector(`#pend-nama-${i}`)?.value.trim() || '';
                const tahun = child.querySelector(`#pend-tahun-${i}`)?.value.trim() || '';
                if (nama) pendHTML += `<div class="mb-7"><p class="font-semibold">${nama}</p><p class="text-slate-600">${tahun}</p></div>`;
            });

            const contentHTML = `
                <div class="flex flex-col items-center text-center mb-10">
                    ${fotoHTML}
                    <h1 class="name mt-6">${nama}</h1>
                    <div class="mt-3 flex flex-wrap justify-center gap-x-6 gap-y-1 text-sm text-slate-600">
                        <span>${telepon}</span>
                        <span>${email}</span>
                        <span>${alamat}</span>
                        ${linkedin ? `<span>${linkedin}</span>` : ''}
                    </div>
                </div>

                ${ringkasan ? `<div><h2 class="section-title">TENTANG SAYA</h2><p class="text-slate-700">${ringkasan}</p></div>` : ''}

                ${expHTML ? `<div class="mt-14"><h2 class="section-title">PENGALAMAN KERJA</h2>${expHTML}</div>` : ''}

                ${magangHTML ? `<div class="mt-14"><h2 class="section-title">PENGALAMAN MAGANG</h2>${magangHTML}</div>` : ''}

                <div class="mt-14"><h2 class="section-title">PENDIDIKAN</h2><div class="mt-5">${pendHTML || '<p class="text-slate-500">Tambahkan pendidikan Anda</p>'}</div></div>

                <div class="mt-14"><h2 class="section-title">KETERAMPILAN</h2><div class="mt-5 text-slate-700 whitespace-pre-line">${keterampilan.replace(/\n/g, '<br>')}</div></div>

                ${sertifikasi ? `<div class="mt-14"><h2 class="section-title">PROYEK & SERTIFIKASI</h2><div class="mt-5 text-slate-700 whitespace-pre-line">${sertifikasi.replace(/\n/g, '<br>')}</div></div>` : ''}
            `;

            document.getElementById('cv-content').innerHTML = contentHTML;
        }

        function printLetter() { updatePreview(); window.print(); }
        function generatePDF() { if (confirm('Simpan sebagai PDF?')) printLetter(); }
        function saveAsImage() {
            const cv = document.getElementById('cv');
            html2canvas(cv, { scale: 3, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CV_Kreatif_V5_${document.getElementById('nama').value.replace(/[^a-zA-Z0-9]/g, '_') || 'CV'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        function autoSaveDraft() { alert('Draft CV V5 berhasil disimpan!'); }
        function clearForm() { if (confirm('Reset semua data?')) location.reload(); }

        // Inisialisasi
        window.onload = () => {
            tambahPendidikan();
            document.getElementById('pend-nama-0').value = "SMK Nurul Ummah Paninggaran - Teknik Jaringan Komputer dan Telekomunikasi";
            document.getElementById('pend-tahun-0').value = "2023 - 2026";

            tambahPengalaman();
            document.getElementById('exp-posisi-0').value = "IT Support";
            document.getElementById('exp-perusahaan-0').value = "PT. ABC Digital";
            document.getElementById('exp-periode-0').value = "Januari - Maret 2025";
            document.getElementById('exp-deskripsi-0').value = "• Maintenance jaringan dan troubleshooting\n• Pembuatan website sekolah menggunakan Tailwind CSS";

            tambahMagang();

            updatePreview();
        };
    </script>
</body>
</html>
